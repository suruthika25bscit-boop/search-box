<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Box</title>
    <style>
        .search-container {
            max-width: 400px;
            margin: 50px auto;
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 10px;
            font-size: 16px;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<form
    action="https://formsubmit.co/suruthika.25bscit@kprcas.ac.in"
    method="POST"
    class="search-container"
>
    <input
        type="text"
        name="search_query"
        placeholder="Search..."
        required
    >

    <button type="submit">Search</button>

    <!-- Optional FormSubmit settings -->
    <input type="hidden" name="_subject" value="New Search Query">
    <input type="hidden" name="_captcha" value="false">
</form>

</body>
</html>
